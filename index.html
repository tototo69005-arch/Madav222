<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🇲🇬 Madagascar Budget</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap');
:root { --bg: #0d1117; --surf: #161b27; --surf2: #1e2638; --border: #252e42; --text: #e2e8f8; --muted: #5a6888; --accent: #e8a045; --green: #4daa7a; --red: #d95f5f; --ar-clr: #9b72d4; --eur-clr: #5c9ee0; }
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'DM Sans', sans-serif; }
body { background: var(--bg); color: var(--text); font-size: 14px; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
header { background: var(--surf); border-bottom: 1px solid var(--border); padding: 15px; flex-shrink: 0; }
h1 { font-size: 18px; color: var(--accent); margin-bottom: 10px; text-align: center; }
.wallets { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.wallet { background: var(--surf2); border: 1px solid var(--border); border-radius: 10px; padding: 8px; text-align: center; }
.w-label { font-size: 9px; color: var(--muted); text-transform: uppercase; margin-bottom: 3px; }
.w-val { font-size: 14px; font-weight: 700; }
.w-ar .w-val { color: var(--ar-clr); } .w-eur .w-val { color: var(--eur-clr); } .w-tot .w-val { color: var(--accent); }
.tab-bar { display: flex; background: var(--surf); border-bottom: 1px solid var(--border); }
.tab-btn { flex: 1; padding: 12px; border: none; background: none; color: var(--muted); font-weight: 700; cursor: pointer; border-bottom: 2px solid transparent; }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
.action-bar { padding: 10px; display: flex; gap: 8px; background: var(--bg); border-bottom: 1px solid var(--border); }
.btn { flex: 1; padding: 10px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; }
.btn-ar { background: rgba(155,114,212,0.2); color: var(--ar-clr); }
.btn-ret { background: #0e2019; color: #5fcf8a; border: 1px solid #245c38; }
.content-area { flex: 1; overflow-y: auto; padding-bottom: 50px; }
.pane { display: none; padding: 15px; } .pane.active { display: block; }
.entry-card { background: var(--surf); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; padding: 12px; display: flex; justify-content: space-between; align-items: center; }
.e-title { font-weight: 500; font-size: 14px; } .e-cat { font-size: 11px; color: var(--muted); }
.e-amt { text-align: right; font-weight: 700; } .e-conv { font-size: 11px; color: var(--muted); }
.chart-box { height: 250px; margin-bottom: 20px; }
.recap-card { background: var(--surf); border: 1px solid var(--border); padding: 15px; border-radius: 12px; margin-bottom: 10px; }
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 100; }
.hidden { display: none !important; }
.modal { background: var(--surf); width: 100%; max-width: 400px; padding: 20px; border-radius: 15px; border: 1px solid var(--border); }
.form-group { margin-bottom: 12px; } label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 5px; }
input, select { width: 100%; padding: 10px; background: var(--surf2); border: 1px solid var(--border); border-radius: 8px; color: white; }
.modal-btns { display: flex; gap: 10px; margin-top: 15px; }
</style>
</head>
<body>

<header>
  <h1>🇲🇬 Mada Budget</h1>
  <div class="wallets">
    <div class="wallet w-ar"><div class="w-label">Cash Ar</div><div id="w-ar" class="w-val">0</div></div>
    <div class="wallet w-eur"><div class="w-label">Cash €</div><div id="w-eur" class="w-val">1000</div></div>
    <div class="wallet w-tot"><div class="w-label">Dépensé</div><div id="w-tot" class="w-val">0 €</div></div>
  </div>
</header>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('dep', this)">Dépenses</button>
  <button class="tab-btn" onclick="switchTab('recap', this)">Récap</button>
</div>

<div id="action-bar" class="action-bar">
  <button class="btn btn-ar" onclick="openMod('dep')">+ Dépense</button>
  <button class="btn btn-ret" onclick="openMod('ret')">↓ Change/Retrait</button>
</div>

<div class="content-area">
  <div id="pane-dep" class="pane active"><div id="list"></div></div>
  <div id="pane-recap" class="pane">
    <div class="chart-box"><canvas id="myChart"></canvas></div>
    <div id="recap-list"></div>
  </div>
</div>

<!-- Modal Dépense -->
<div id="mod-dep" class="overlay hidden">
  <div class="modal">
    <h3>Nouvelle dépense</h3>
    <div class="form-group"><label>Titre</label><input id="d-t" type="text" placeholder="ex: Resto"></div>
    <div class="form-group"><label>Montant</label><input id="d-m" type="number" inputmode="decimal"></div>
    <div class="form-group">
      <label>Devise</label>
      <select id="d-d"><option value="Ar">Ariary (Cash)</option><option value="EUR">Euro (Cash)</option></select>
    </div>
    <div class="form-group">
      <label>Catégorie</label>
      <select id="d-c"><option>🍽 Nourriture</option><option>🏠 Logement</option><option>🚙 4x4</option><option>🏄 Activité</option></select>
    </div>
    <div class="modal-btns">
      <button onclick="closeMod()" class="btn" style="background:var(--surf2); color:white;">Annuler</button>
      <button onclick="saveDep()" class="btn btn-ar">Enregistrer</button>
    </div>
  </div>
</div>

<script>
let entries = JSON.parse(localStorage.getItem('mada_v1') || '[]');
let chart = null;

function save() { localStorage.setItem('mada_v1', JSON.stringify(entries)); render(); }

function switchTab(t, btn) {
  document.querySelectorAll('.pane, .tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('pane-' + t).classList.add('active');
  btn.classList.add('active');
  document.getElementById('action-bar').classList.toggle('hidden', t === 'recap');
  if(t === 'recap') renderRecap();
}

function openMod(m) { document.getElementById('mod-' + m).classList.remove('hidden'); }
function closeMod() { document.querySelectorAll('.overlay').forEach(o => o.classList.add('hidden')); }

function saveDep() {
  const e = {
    id: Date.now(),
    t: document.getElementById('d-t').value,
    m: parseFloat(document.getElementById('d-m').value),
    d: document.getElementById('d-d').value,
    c: document.getElementById('d-c').value,
    date: new Date().toLocaleDateString('fr-FR')
  };
  if(!e.t || !e.m) return alert('Remplis tout !');
  entries.push(e); save(); closeMod();
}

function render() {
  const list = document.getElementById('list');
  let cAr = 0, cEu = 1000, tEu = 0;
  list.innerHTML = entries.map(e => {
    if(e.d === 'Ar') cAr -= e.m; else cEu -= e.m;
    if(e.d === 'EUR') tEu += e.m; else tEu += (e.m / 4500); 
    return `<div class="entry-card"><div><div class="e-title">${e.t}</div><div class="e-cat">${e.c}</div></div><div class="e-amt" style="color:${e.d==='Ar'?'var(--ar-clr)':'var(--eur-clr)'}">${e.m.toLocaleString()} ${e.d}</div></div>`;
  }).join('');
  document.getElementById('w-ar').innerText = cAr.toLocaleString() + ' Ar';
  document.getElementById('w-eur').innerText = cEu.toLocaleString() + ' €';
  document.getElementById('w-tot').innerText = Math.round(tEu) + ' €';
}

function renderRecap() {
  const cats = {};
  entries.forEach(e => {
    const val = e.d === 'EUR' ? e.m : e.m / 4500;
    cats[e.c] = (cats[e.c] || 0) + val;
  });
  
  if(chart) chart.destroy();
  const ctx = document.getElementById('myChart').getContext('2d');
  chart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: Object.keys(cats),
      datasets: [{ data: Object.values(cats), backgroundColor: ['#e8a045', '#4daa7a', '#5c9ee0', '#9b72d4'], borderWeight: 0 }]
    },
    options: { plugins: { legend: { position: 'bottom', labels: { color: '#fff' } } } }
  });
}

render();
</script>
</body>
</html>
