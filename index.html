<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="🇲🇬 Mada">
<title>🇲🇬 Madagascar</title>
<!-- Ajout de Chart.js pour le "machin Canvas" -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap');

:root {
  --bg: #0d1117; --surf: #161b27; --surf2: #1e2638; --border: #252e42;
  --text: #e2e8f8; --muted: #5a6888; --accent: #e8a045; --green: #4daa7a;
  --red: #d95f5f; --ar-clr: #9b72d4; --eur-clr: #5c9ee0; --cb-clr: #d97a5c;
  --ret-bg: #0e2019; --ret-border: #245c38; --ret-text: #5fcf8a;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; overscroll-behavior: none; }

/* ── HEADER ── */
header { background: var(--surf); border-bottom: 1px solid var(--border); padding: 14px 16px 12px; position: relative; z-index: 50; flex-shrink: 0; }
.header-top { display: flex; align-items: center; justify-content: space-between; }
.header-top h1 { font-family: 'DM Serif Display', serif; font-size: 18px; color: var(--accent); }
.header-top .hint-btn { font-size: 11px; color: var(--muted); background: none; border: 1px solid var(--border); border-radius: 6px; padding: 4px 9px; cursor: pointer; display: flex; align-items: center; gap: 5px; }
.hint-btn .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); flex-shrink: 0; transition: background .3s; }
.hint-btn .sync-dot.syncing { background: var(--accent); animation: pulse 1s infinite; }
.hint-btn .sync-dot.synced  { background: var(--green); }
.hint-btn .sync-dot.error   { background: var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

.wallets { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 12px; }
.wallet { background: var(--surf2); border: 1px solid var(--border); border-radius: 10px; padding: 8px 10px; text-align: center; }
.wallet .w-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 3px; }
.wallet .w-val   { font-size: 15px; font-weight: 600; }
.wallet .w-sub   { font-size: 10px; color: var(--muted); margin-top: 1px; }
.w-ar  .w-val { color: var(--ar-clr); } .w-eur .w-val { color: var(--eur-clr); } .w-tot .w-val { color: var(--accent); }

/* ── TAB BAR & ACTION BAR ── */
.tab-bar { display: flex; background: var(--surf); border-bottom: 1px solid var(--border); position: relative; z-index: 40; flex-shrink: 0; }
.tab-btn { flex: 1; padding: 10px 8px; text-align: center; font-size: 12px; font-weight: 600; color: var(--muted); cursor: pointer; border: none; background: none; border-bottom: 2px solid transparent; transition: all .2s; font-family: 'DM Sans', sans-serif; }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

.action-bar { display: flex; gap: 8px; padding: 10px 16px; border-bottom: 1px solid var(--border); background: var(--bg); position: relative; z-index: 39; flex-shrink: 0; }
.btn { display: inline-flex; align-items: center; gap: 5px; padding: 9px 14px; border-radius: 9px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; border: none; white-space: nowrap; transition: opacity .1s; }
.btn-ar   { background: rgba(155,114,212,.18); color: var(--ar-clr); flex: 2; }
.btn-ret  { background: var(--ret-bg); color: var(--ret-text); border: 1px solid var(--ret-border); flex: 1; }
.btn-more { background: var(--surf2); color: var(--muted); border: 1px solid var(--border); padding: 9px 11px; }

/* ── LAYOUT & CONTENT ── */
.swipe-wrapper { display: flex; width: 200%; transition: transform .3s cubic-bezier(.4,0,.2,1); flex: 1; min-height: 0; }
.swipe-wrapper.tab-recap { transform: translateX(-50%); }
.tab-pane { width: 50%; overflow-y: auto; -webkit-overflow-scrolling: touch; height: 100%; }
.app-shell { display: flex; flex-direction: column; height: 100%; }
.scrollable-area { flex: 1; min-height: 0; overflow: hidden; display: flex; flex-direction: column; }
.content, .recap-content { padding: 0 12px 100px; }
.recap-content { padding-top: 16px; }

/* ── COMPONENTS ── */
.day-sep { display: flex; align-items: center; gap: 10px; padding: 20px 0 8px; cursor: pointer; user-select: none; }
.day-line { flex: 1; height: 1px; background: var(--border); }
.day-label { font-family: 'DM Serif Display', serif; font-size: 13px; color: var(--accent); white-space: nowrap; display: flex; align-items: center; gap: 6px; }
.day-total { font-size: 11px; color: var(--muted); font-family: 'DM Sans', sans-serif; }
.day-toggle { font-size: 11px; color: var(--muted); transition: transform .25s; display: inline-block; }
.day-sep.collapsed .day-toggle { transform: rotate(-90deg); }
.day-entries { transition: none; overflow: hidden; } .day-entries.hidden { display: none; }
.day-summary-strip { display: flex; gap: 6px; flex-wrap: wrap; padding: 0 4px 12px; }
.day-summary-strip.hidden { display: none; }
.dss-badge { display: inline-flex; align-items: center; gap: 4px; background: var(--surf2); border: 1px solid var(--border); border-radius: 20px; padding: 3px 9px; font-size: 11px; color: var(--muted); }
.dss-badge strong { color: var(--text); font-weight: 600; }

.entry-card { background: var(--surf); border: 1px solid var(--border); border-radius: 11px; margin-bottom: 6px; overflow: hidden; cursor: pointer; }
.entry-card.retrait { background: var(--ret-bg); border-color: var(--ret-border); }
.entry-main { display: grid; grid-template-columns: 1fr auto; gap: 4px 10px; padding: 11px 13px; align-items: start; }
.entry-title { font-size: 13px; font-weight: 500; color: var(--text); }
.entry-meta  { font-size: 11px; color: var(--muted); margin-top: 2px; display: flex; gap: 7px; align-items: center; }
.entry-amounts { text-align: right; }
.entry-main-amt { font-size: 14px; font-weight: 700; }
.entry-conv-amt { font-size: 11px; color: var(--muted); margin-top: 1px; }
.entry-card.retrait .entry-title, .entry-card.retrait .entry-main-amt { color: var(--ret-text); }
.badge { display: inline-block; padding: 1px 7px; border-radius: 20px; font-size: 10px; font-weight: 600; }
.b-ar  { background: rgba(155,114,212,.15); color: var(--ar-clr); } .b-eur { background: rgba(92,158,224,.15);  color: var(--eur-clr); }
.b-cb  { background: rgba(217,122,92,.15);  color: var(--cb-clr); } .b-cat { background: rgba(255,255,255,.06); color: var(--muted); }
.entry-solde { display: flex; justify-content: flex-end; align-items: center; gap: 8px; padding: 0 13px 9px; font-size: 11px; }
.solde-label { color: var(--muted); } .solde-val { font-weight: 600; font-size: 12px; }
.solde-ok { color: var(--green); } .solde-warn { color: var(--accent); } .solde-low { color: var(--red); }
.entry-panel { padding: 10px 13px 12px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
.entry-card.retrait .entry-panel { border-color: var(--ret-border); } .entry-panel.hidden { display: none; }
.panel-note { font-size: 12px; color: var(--muted); font-style: italic; line-height: 1.5; }
.panel-actions { display: flex; gap: 8px; justify-content: flex-end; }
.panel-btn { padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; font-family: 'DM Sans', sans-serif; }
.panel-btn-edit { background: rgba(92,158,224,.15); color: var(--eur-clr); } .panel-btn-delete { background: rgba(217,95,95,.12); color: var(--red); }

/* ── RECAP TAB & CANVAS ── */
.recap-section { margin-bottom: 24px; }
.recap-title { font-family: 'DM Serif Display', serif; font-size: 15px; color: var(--accent); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.recap-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.recap-card { background: var(--surf); border: 1px solid var(--border); border-radius: 10px; padding: 12px 13px; }
.recap-card .rc-label { font-size: 10px; color: var(--muted); margin-bottom: 4px; }
.recap-card .rc-val { font-size: 16px; font-weight: 700; }
.recap-card .rc-sub { font-size: 10px; color: var(--muted); margin-top: 2px; }
.prog-bar-wrap { background: var(--surf2); border-radius: 6px; height: 6px; margin-top: 6px; overflow: hidden; }
.prog-bar { height: 100%; border-radius: 6px; transition: width .4s ease; }
.cat-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 13px; background: var(--surf); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 6px; }
.cat-row .cr-left { display: flex; align-items: center; gap: 8px; font-size: 13px; } .cat-row .cr-right { text-align: right; }
.cat-row .cr-eur { font-weight: 700; font-size: 13px; color: var(--accent); } .cat-row .cr-pct { font-size: 10px; color: var(--muted); }
.daily-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
.daily-row .dr-label { font-size: 11px; color: var(--muted); width: 52px; flex-shrink: 0; }
.daily-row .dr-bar-wrap { flex: 1; background: var(--surf2); border-radius: 4px; height: 22px; overflow: hidden; position: relative; }
.daily-row .dr-bar { height: 100%; border-radius: 4px; background: rgba(232,160,69,.4); display: flex; align-items: center; padding: 0 8px; min-width: 4px; transition: width .4s ease; }
.daily-row .dr-amt { font-size: 10px; color: var(--accent); font-weight: 600; white-space: nowrap; }
.chart-container { position: relative; width: 100%; height: 220px; margin: 0 auto 20px; }

/* ── MODALS & FORMS ── */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 200; display: flex; align-items: flex-end; justify-content: center; backdrop-filter: blur(4px); padding: 0; }
.overlay.hidden { display: none; }
.modal { background: var(--surf); border-radius: 20px 20px 0 0; padding: 20px 18px 36px; width: 100%; max-width: 540px; max-height: 92vh; overflow-y: auto; animation: slideUp .22s ease; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 18px; }
.modal h2 { font-family: 'DM Serif Display', serif; font-size: 17px; margin-bottom: 16px; }
.form-group { margin-bottom: 13px; }
.form-group label { display: block; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 5px; font-weight: 600; }
.form-group input, .form-group select, .form-group textarea { width: 100%; background: var(--surf2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; padding: 11px 13px; outline: none; transition: border-color .15s; -webkit-appearance: none; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
.form-group textarea { resize: none; height: 70px; font-size: 14px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.devise-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 13px; }
.devise-btn { padding: 10px 6px; border-radius: 10px; border: 2px solid var(--border); background: var(--surf2); color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; text-align: center; transition: all .15s; }
.devise-btn.active-ar  { border-color: var(--ar-clr);  color: var(--ar-clr);  background: rgba(155,114,212,.12); }
.devise-btn.active-eur { border-color: var(--eur-clr); color: var(--eur-clr); background: rgba(92,158,224,.12); }
.devise-btn.active-cb  { border-color: var(--cb-clr);  color: var(--cb-clr);  background: rgba(217,122,92,.12); }
.preview { background: var(--surf2); border-radius: 10px; padding: 11px 13px; font-size: 13px; color: var(--accent); text-align: center; margin-bottom: 13px; min-height: 42px; }
.modal-btns { display: flex; gap: 10px; margin-top: 4px; }
.btn-save   { flex: 1; background: var(--accent); color: #0d1117; }
.btn-cancel { background: var(--surf2); color: var(--muted); border: 1px solid var(--border); padding: 11px 16px; }
.btn-save-ret { flex: 1; background: var(--ret-bg); color: var(--ret-text); border: 1px solid var(--ret-border); }

/* ── MISC MENUS & SCREENS ── */
.more-menu { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surf); border-top: 1px solid var(--border); border-radius: 20px 20px 0 0; padding: 16px 16px 36px; z-index: 200; }
.more-menu.hidden { display: none; }
.more-item { display: flex; align-items: center; gap: 12px; padding: 13px 4px; border-bottom: 1px solid var(--border); cursor: pointer; font-size: 14px; color: var(--text); }
.more-item:last-child { border-bottom: none; }
.more-item .mi-icon { font-size: 18px; width: 28px; text-align: center; } .more-item .mi-sub  { font-size: 11px; color: var(--muted); }
.empty { text-align: center; padding: 60px 20px; color: var(--muted); } .empty .e-ico { font-size: 40px; margin-bottom: 12px; }

/* (Cloud & PIN UI hidden natively if skipped) */
.setup-screen, .pin-overlay, .cloud-bar { display: none; }
</style>
</head>
<body>

<div class="app-shell">
  <!-- HEADER -->
  <header>
    <div class="header-top">
      <h1>🇲🇬 Madagascar</h1>
    </div>
    <div class="wallets">
      <div class="wallet w-ar"><div class="w-label">💜 Cash Ar</div><div class="w-val" id="w-ar">—</div><div class="w-sub" id="w-ar-eur">—</div></div>
      <div class="wallet w-eur"><div class="w-label">💶 Cash €</div><div class="w-val" id="w-eur">—</div><div class="w-sub">sur 1 000€</div></div>
      <div class="wallet w-tot"><div class="w-label">💸 Dépensé</div><div class="w-val" id="w-tot">—</div><div class="w-sub" id="w-tot-ar">—</div></div>
    </div>
  </header>

  <!-- TAB BAR -->
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-dep" onclick="switchTab('dep')">📋 Dépenses</button>
    <button class="tab-btn" id="tab-recap" onclick="switchTab('recap')">📊 Récapitulatif</button>
  </div>

  <!-- ACTION BAR -->
  <div class="action-bar" id="action-bar">
    <button class="btn btn-ar" onclick="openDep('Ar')">＋ Dépense Ar</button>
    <button class="btn btn-ret" onclick="openRet()">↓ Retrait/Change</button>
    <button class="btn btn-more" onclick="toggleMore()">⋯</button>
  </div>

  <!-- SCROLLABLE -->
  <div class="scrollable-area">
    <div class="swipe-wrapper" id="swipe-wrapper">
      <!-- TAB 1: DÉPENSES -->
      <div class="tab-pane" id="pane-dep">
        <div class="content" id="content">
          <div class="empty" id="empty"><div class="e-ico">🌴</div><p>Aucune entrée</p></div>
          <div id="entries-list"></div>
        </div>
      </div>
      <!-- TAB 2: RÉCAPITULATIF -->
      <div class="tab-pane" id="pane-recap">
        <div class="recap-content" id="recap-content"></div>
      </div>
    </div>
  </div>
</div>

<!-- MODALS -->
<!-- Modale Dépense -->
<div class="overlay hidden" id="ov-dep">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="dep-title">＋ Nouvelle dépense</h2>
    <div class="form-group"><label>Titre</label><input type="text" id="d-titre" placeholder="ex: Restaurant"></div>
    <div class="form-row">
      <div class="form-group"><label>Date</label><input type="date" id="d-date"></div>
      <div class="form-group"><label>Catégorie</label>
        <select id="d-cat">
          <option value="Nourriture">🍽 Nourriture</option>
          <option value="Transport">🚌 Transport</option>
          <option value="Hébergement">🏠 Hébergement</option>
          <option value="Activités">🏄 Activités</option>
          <option value="Shopping">🛍 Shopping</option>
          <option value="4x4">🚙 4x4 (Frais)</option>
        </select>
      </div>
    </div>
    <label style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;font-weight:600;display:block;margin-bottom:6px">Paiement</label>
    <div class="devise-group" id="devise-group">
      <button class="devise-btn active-ar" onclick="setDevise('Ar')">Ar Cash</button>
      <button class="devise-btn" onclick="setDevise('EUR')">€ Cash</button>
      <button class="devise-btn" onclick="setDevise('CB')">💳 CB</button>
    </div>
    <div class="form-group"><label>Montant <span id="d-devise-label" style="color:var(--ar-clr)">en Ariary</span></label><input type="number" id="d-montant" inputmode="decimal" oninput="updateDepPreview()"></div>
    <div class="preview" id="d-preview">Entrez un montant…</div>
    <div class="form-group"><label>Note</label><textarea id="d-note" placeholder="Détails…"></textarea></div>
    <div class="modal-btns">
      <button class="btn btn-cancel" onclick="closeOv('ov-dep')">Annuler</button>
      <button class="btn btn-save" onclick="saveDep()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- Modale Retrait -->
<div class="overlay hidden" id="ov-ret">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 style="color:var(--ret-text)">↓ Retrait / Change</h2>
    <div class="form-group">
      <label>Type</label>
      <select id="r-type" onchange="updateRetPreview()">
        <option value="Change">💱 Change EUR → Ar</option>
        <option value="Retrait">🏧 Retrait DAB (Ar)</option>
        <option value="RetraitEUR">🏧 Retrait DAB (€)</option>
      </select>
    </div>
    <div class="form-group"><label>Description</label><input type="text" id="r-desc" placeholder="ex: Bureau de change"></div>
    <div class="form-row">
      <div class="form-group"><label>Date</label><input type="date" id="r-date"></div>
      <div class="form-group"><label>Montant EUR débité</label><input type="number" id="r-eur" inputmode="decimal" oninput="updateRetPreview()"></div>
    </div>
    <div class="form-group" id="r-taux-group"><label>Taux (1€ = ? Ar)</label><input type="number" id="r-taux" inputmode="decimal" oninput="updateRetPreview()"></div>
    <div class="preview" id="r-preview">Entrez un montant…</div>
    <div class="modal-btns">
      <button class="btn btn-cancel" onclick="closeOv('ov-ret')">Annuler</button>
      <button class="btn btn-save-ret" onclick="saveRet()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- Modale Confirm -->
<div class="overlay hidden" id="ov-confirm">
  <div class="modal" style="padding:28px 20px 32px">
    <div class="modal-handle"></div>
    <p id="confirm-msg" style="font-size:16px;font-weight:600;text-align:center;margin-bottom:24px"></p>
    <div class="modal-btns">
      <button class="btn btn-cancel" style="flex:1;justify-content:center" onclick="confirmNo()">Annuler</button>
      <button class="btn" style="flex:1;justify-content:center;background:rgba(217,95,95,.18);color:var(--red);border:1px solid rgba(217,95,95,.3)" onclick="confirmYes()">🗑 Supprimer</button>
    </div>
  </div>
</div>

<!-- More Menu -->
<div class="more-menu hidden" id="more-menu">
  <div style="width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px"></div>
  <div class="more-item" onclick="openDep('EUR');toggleMore()"><span class="mi-icon">💶</span><div><div>Dépense en € Cash</div></div></div>
  <div class="more-item" onclick="openDep('CB');toggleMore()"><span class="mi-icon">💳</span><div><div>Paiement CB</div></div></div>
  <div class="more-item" onclick="exportData();toggleMore()"><span class="mi-icon">⬇️</span><div><div>Export JSON (Sauvegarde)</div></div></div>
  <div class="more-item" onclick="document.getElementById('import-file').click();toggleMore()"><span class="mi-icon">⬆️</span><div><div>Import JSON (Restaurer)</div></div></div>
  <div class="more-item" style="margin-top:4px" onclick="toggleMore()"><span class="mi-icon">✕</span><div>Fermer</div></div>
  <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
</div>

<script>
// STATE
let entries = [];
let editId  = null;
let curDevise = 'Ar';
let collapsedDays = {};
let myChart = null; // Variable pour le Canvas Chart.js

const CASH_EUR_INIT = 1000;
const BUDGET_4X4_EUR = 1100;

// STORAGE
function saveLocal() { localStorage.setItem('mdg3_entries', JSON.stringify(entries)); }
function loadLocal() { const d = localStorage.getItem('mdg3_entries'); if(d) entries = JSON.parse(d); }
function saveCollapsed() { localStorage.setItem('mdg3_collapsed', JSON.stringify(collapsedDays)); }
function loadCollapsed() { const d = localStorage.getItem('mdg3_collapsed'); if(d) collapsedDays = JSON.parse(d); }

// UTILS
function uid()  { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function todayStr() { return new Date().toISOString().slice(0, 10); }
function fEUR(n)  { return n.toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2}) + ' €'; }
function fAr(n)   { return Math.round(n).toLocaleString('fr-FR') + ' Ar'; }
function fDate(d) { const dt=new Date(d); return dt.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'}); }
function fDateShort(d) { const dt=new Date(d); return dt.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'}); }
function lastTaux() { const rs = entries.filter(e => e.kind==='retrait' && e.taux && e.type!=='RetraitEUR').sort((a,b)=>a.ts-b.ts); return rs.length ? rs[rs.length-1].taux : 4600; }
function catEmoji(c) { return {Hébergement:'🏠',Nourriture:'🍽',Transport:'🚌',Activités:'🏄',Shopping:'🛍','4x4':'🚙'}[c]||''; }
function catColor(c) { return {Hébergement:'#4daa7a',Nourriture:'#e8a045',Transport:'#5c9ee0',Activités:'#9b72d4',Shopping:'#d95f5f','4x4':'#d97a5c'}[c]||'#5a6888'; }

// TABS
let currentTab = 'dep';
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-dep').classList.toggle('active', tab==='dep');
  document.getElementById('tab-recap').classList.toggle('active', tab==='recap');
  document.getElementById('swipe-wrapper').classList.toggle('tab-recap', tab==='recap');
  document.getElementById('action-bar').style.display = tab==='dep' ? 'flex' : 'none';
  if (tab==='recap') setTimeout(renderRecap, 50); // Delay for CSS transition
}

// UI
function closeOv(id) { document.getElementById(id).classList.add('hidden'); }
function toggleMore() { document.getElementById('more-menu').classList.toggle('hidden'); }
function togglePanel(id) { const el = document.getElementById('panel-'+id); if(el) el.classList.toggle('hidden'); }
function toggleDay(date) { collapsedDays[date] = !collapsedDays[date]; saveCollapsed(); render(); }

function setDevise(d) {
  curDevise = d;
  document.querySelectorAll('.devise-btn').forEach(b => b.className = 'devise-btn');
  const btns = document.querySelectorAll('.devise-btn');
  if (d==='Ar')  btns[0].className = 'devise-btn active-ar';
  if (d==='EUR') btns[1].className = 'devise-btn active-eur';
  if (d==='CB')  btns[2].className = 'devise-btn active-cb';
  document.getElementById('d-devise-label').textContent = {Ar:'en Ariary',EUR:'en Euros (€)',CB:'CB (€)'}[d];
  document.getElementById('d-devise-label').style.color = {Ar:'var(--ar-clr)',EUR:'var(--eur-clr)',CB:'var(--cb-clr)'}[d];
  updateDepPreview();
}

// PREVIEW
function updateDepPreview() {
  const m = parseFloat(document.getElementById('d-montant').value)||0; const t = lastTaux(); const el = document.getElementById('d-preview');
  if(!m) { el.textContent='Entrez un montant…'; return; }
  if(curDevise==='Ar') el.textContent = fAr(m)+' ≈ '+fEUR(m/t)+' (1€='+t+')';
  if(curDevise==='EUR') el.textContent = fEUR(m)+' ≈ '+fAr(m*t);
  if(curDevise==='CB') el.textContent = fEUR(m)+' par CB ≈ '+fAr(m*t);
}
function updateRetPreview() {
  const eur=parseFloat(document.getElementById('r-eur').value)||0; const taux=parseFloat(document.getElementById('r-taux').value)||0;
  const type=document.getElementById('r-type').value; const el=document.getElementById('r-preview');
  document.getElementById('r-taux-group').style.display = type==='RetraitEUR'?'none':'';
  if(!eur) { el.textContent='Entrez un montant…'; return; }
  if(type==='RetraitEUR') { el.textContent = '+ '+fEUR(eur)+' en cash €'; return; }
  if(taux) el.textContent = fEUR(eur)+' → '+fAr(eur*taux)+' (1€='+taux+')'; else el.textContent='Entrez le taux';
}

// ACTIONS
function openDep(preset) {
  editId=null; document.getElementById('dep-title').textContent='＋ Nouvelle dépense'; document.getElementById('d-date').value=todayStr();
  document.getElementById('d-titre').value=''; document.getElementById('d-montant').value=''; document.getElementById('d-note').value='';
  setDevise(preset||'Ar'); document.getElementById('ov-dep').classList.remove('hidden');
}
function openRet() {
  editId=null; document.getElementById('r-date').value=todayStr(); document.getElementById('r-eur').value='';
  document.getElementById('r-taux').value=lastTaux(); document.getElementById('r-desc').value=''; document.getElementById('ov-ret').classList.remove('hidden'); updateRetPreview();
}

function saveDep() {
  const date=document.getElementById('d-date').value, titre=document.getElementById('d-titre').value.trim(), cat=document.getElementById('d-cat').value;
  const montant=parseFloat(document.getElementById('d-montant').value), note=document.getElementById('d-note').value.trim();
  if(!date||!titre||isNaN(montant)||montant<=0) { alert('Remplis date, titre, montant.'); return; }
  const e = {id:editId||uid(), ts:Date.now(), kind:'depense', date, titre, cat, montant, devise:curDevise, note, taux:lastTaux()};
  if(editId) { const i=entries.findIndex(x=>x.id===editId); if(i!==-1) entries[i]=e; } else entries.push(e);
  saveLocal(); closeOv('ov-dep'); render();
}
function saveRet() {
  const date=document.getElementById('r-date').value, type=document.getElementById('r-type').value, desc=document.getElementById('r-desc').value.trim();
  const eur=parseFloat(document.getElementById('r-eur').value), taux=parseFloat(document.getElementById('r-taux').value), note='';
  if(!date||isNaN(eur)||eur<=0) { alert('Remplis date et montant.'); return; }
  const e = {id:editId||uid(), ts:Date.now(), kind:'retrait', date, type, desc:desc||type, eur, taux:type==='RetraitEUR'?null:taux, ar:type==='RetraitEUR'?0:eur*taux, note};
  if(editId) { const i=entries.findIndex(x=>x.id===editId); if(i!==-1) entries[i]=e; } else entries.push(e);
  saveLocal(); closeOv('ov-ret'); render();
}

let confirmCb=null;
function confirmYes() { document.getElementById('ov-confirm').classList.add('hidden'); if(confirmCb)confirmCb(); }
function confirmNo()  { document.getElementById('ov-confirm').classList.add('hidden'); confirmCb=null; }
function deleteEntry(id, ev) { ev.stopPropagation(); document.getElementById('confirm-msg').textContent="Supprimer ?"; confirmCb=()=>{ entries=entries.filter(e=>e.id!==id); saveLocal(); render(); }; document.getElementById('ov-confirm').classList.remove('hidden'); }

function editEntry(id, ev) {
  ev.stopPropagation(); const e = entries.find(x=>x.id===id); if(!e) return; editId=id;
  if(e.kind==='depense') { document.getElementById('d-date').value=e.date; document.getElementById('d-titre').value=e.titre; document.getElementById('d-cat').value=e.cat; document.getElementById('d-montant').value=e.montant; document.getElementById('d-note').value=e.note||''; setDevise(e.devise); document.getElementById('ov-dep').classList.remove('hidden'); }
  else { document.getElementById('r-type').value=e.type; document.getElementById('r-date').value=e.date; document.getElementById('r-desc').value=e.desc; document.getElementById('r-eur').value=e.eur; document.getElementById('r-taux').value=e.taux||''; updateRetPreview(); document.getElementById('ov-ret').classList.remove('hidden'); }
}

// COMPUTE
function computeAll() {
  const sorted = [...entries].sort((a,b)=>a.date<b.date?-1:a.date>b.date?1:a.ts-b.ts);
  let cashAr=0, cashEUR=CASH_EUR_INIT;
  sorted.forEach(e=>{
    if(e.kind==='retrait'){ if(e.type==='RetraitEUR') cashEUR+=e.eur; else { if(e.type==='Change') cashEUR-=e.eur; cashAr+=e.ar; } }
    else { if(e.devise==='EUR') cashEUR-=e.montant; if(e.devise==='Ar') cashAr-=e.montant; }
    e._cAr=cashAr; e._cEur=cashEUR;
  });
  const t=lastTaux();
  const totEUR = sorted.filter(e=>e.kind==='depense').reduce((s,e)=>s+(e.devise==='Ar'?e.montant/(e.taux||t):e.montant),0);
  const totAr  = sorted.filter(e=>e.kind==='depense').reduce((s,e)=>s+(e.devise==='Ar'?e.montant:e.montant*(e.taux||t)),0);
  return { sorted, cashAr, cashEUR, totEUR, totAr };
}

// RENDER DEPENSES
function render() {
  const { sorted, cashAr, cashEUR, totEUR, totAr } = computeAll(); const t = lastTaux();
  document.getElementById('w-ar').textContent=fAr(cashAr); document.getElementById('w-ar-eur').textContent='≈ '+fEUR(cashAr/t);
  document.getElementById('w-eur').textContent=fEUR(cashEUR); document.getElementById('w-tot').textContent=fEUR(totEUR); document.getElementById('w-tot-ar').textContent=fAr(totAr);

  if(!entries.length) { document.getElementById('empty').style.display=''; document.getElementById('entries-list').innerHTML=''; return; }
  document.getElementById('empty').style.display='none';

  const byDay={}; sorted.forEach(e=>(byDay[e.date]||(byDay[e.date]=[])).push(e));
  let html='';
  Object.keys(byDay).sort().reverse().forEach(date => { // Reverse for newest first
    const day=byDay[date]; const col=!!collapsedDays[date];
    const dayTot=day.filter(e=>e.kind==='depense').reduce((s,e)=>s+(e.devise==='Ar'?e.montant/(e.taux||t):e.montant),0);
    html += `<div class="day-sep ${col?'collapsed':''}" onclick="toggleDay('${date}')"><div class="day-line"></div><div class="day-label"><span class="day-toggle">▼</span>📅 ${fDate(date)} <span class="day-total">${dayTot>0?'— '+fEUR(dayTot):''}</span></div><div class="day-line"></div></div><div class="day-entries ${col?'hidden':''}">`;
    day.slice().reverse().forEach(e => {
      if(e.kind==='retrait') {
        const isE=e.type==='RetraitEUR';
        html += `<div class="entry-card retrait" onclick="togglePanel('${e.id}')"><div class="entry-main"><div><div class="entry-title">${isE?'🏧 Retrait €':'💱 '+e.type}</div><div class="entry-meta">${e.desc}</div></div><div class="entry-amounts"><div class="entry-main-amt">+${fEUR(e.eur)}</div><div class="entry-conv-amt">${isE?'→ cash €':'→ '+fAr(e.ar)}</div></div></div><div class="entry-solde"><span class="solde-val solde-ok">${fEUR(e._cEur)}</span><span style="color:var(--muted)">|</span><span class="solde-val" style="color:var(--ar-clr)">${fAr(e._cAr)}</span></div><div class="entry-panel hidden" id="panel-${e.id}"><div class="panel-actions"><button class="panel-btn panel-btn-edit" onclick="editEntry('${e.id}',event)">✏️</button><button class="panel-btn panel-btn-delete" onclick="deleteEntry('${e.id}',event)">🗑</button></div></div></div>`;
      } else {
        const isAr=e.devise==='Ar', mainAmt=isAr?fAr(e.montant):fEUR(e.montant), tt=e.taux||t, convAmt=isAr?'≈ '+fEUR(e.montant/tt):'≈ '+fAr(e.montant*tt);
        html += `<div class="entry-card" onclick="togglePanel('${e.id}')"><div class="entry-main"><div><div class="entry-title">${e.titre}</div><div class="entry-meta"><span class="badge b-cat">${catEmoji(e.cat)} ${e.cat}</span><span class="badge ${e.devise==='Ar'?'b-ar':e.devise==='CB'?'b-cb':'b-eur'}">${e.devise}</span></div></div><div class="entry-amounts"><div class="entry-main-amt" style="color:${isAr?'var(--ar-clr)':e.devise==='CB'?'var(--cb-clr)':'var(--eur-clr)'}">${mainAmt}</div><div class="entry-conv-amt">${convAmt}</div></div></div><div class="entry-solde"><span class="solde-val ${e._cEur>100?'solde-ok':'solde-low'}">${fEUR(e._cEur)}</span><span style="color:var(--muted)">|</span><span class="solde-val ${e._cAr>100000?'solde-ok':'solde-low'}">${fAr(e._cAr)}</span></div><div class="entry-panel hidden" id="panel-${e.id}"><div class="panel-note">${e.note||'<em>Pas de note</em>'}</div><div class="panel-actions"><button class="panel-btn panel-btn-edit" onclick="editEntry('${e.id}',event)">✏️</button><button class="panel-btn panel-btn-delete" onclick="deleteEntry('${e.id}',event)">🗑</button></div></div></div>`;
      }
    });
    html += `</div>`;
  });
  document.getElementById('entries-list').innerHTML=html;
  if(currentTab==='recap') renderRecap();
}

// RENDER RECAP & CANVAS CHART
function renderRecap() {
  const { sorted, cashAr, cashEUR, totEUR, totAr } = computeAll(); const t=lastTaux();
  const dep = sorted.filter(e=>e.kind==='depense');
  const byCat={}, byPay={EUR:0,Ar:0,CB:0};
  dep.forEach(e=>{ const v=e.devise==='Ar'?e.montant/(e.taux||t):e.montant; byCat[e.cat]=(byCat[e.cat]||0)+v; byPay[e.devise]+=v; });
  
  const pctB = Math.min(100,(totEUR/CASH_EUR_INIT)*100), pct4 = Math.min(100,((byCat['4x4']||0)/BUDGET_4X4_EUR)*100);

  let html = `<div class="recap-section"><div class="recap-title">💸 Global</div><div class="recap-grid">
    <div class="recap-card"><div class="rc-label">Dépensé</div><div class="rc-val" style="color:var(--accent)">${fEUR(totEUR)}</div><div class="prog-bar-wrap"><div class="prog-bar" style="width:${pctB}%;background:var(--accent)"></div></div></div>
    <div class="recap-card"><div class="rc-label">Reste estimé</div><div class="rc-val" style="color:var(--green)">${fEUR(cashEUR+cashAr/t)}</div></div>
  </div></div>`;

  html += `<div class="recap-section"><div class="recap-title">🚙 Budget 4x4</div><div class="recap-card" style="width:100%"><div style="display:flex;justify-content:space-between"><div><div class="rc-label">Dépensé</div><div class="rc-val" style="color:var(--eur-clr)">${fEUR(byCat['4x4']||0)}</div></div><div style="text-align:right"><div class="rc-label">Prévu: ${fEUR(BUDGET_4X4_EUR)}</div><div class="rc-val" style="color:var(--muted)">Reste: ${fEUR(BUDGET_4X4_EUR-(byCat['4x4']||0))}</div></div></div><div class="prog-bar-wrap"><div class="prog-bar" style="width:${pct4}%;background:var(--eur-clr)"></div></div></div></div>`;

  // LE CANVAS !
  html += `<div class="recap-section"><div class="recap-title">📂 Répartition par catégorie</div>
  <div class="chart-container"><canvas id="catChart"></canvas></div>`;
  
  const sortedCats = Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
  sortedCats.forEach(([c,v])=>{
    html += `<div class="cat-row"><div class="cr-left">${catEmoji(c)} ${c}</div><div class="cr-right"><div class="cr-eur">${fEUR(v)}</div></div></div>`;
  });
  html += `</div>`;

  document.getElementById('recap-content').innerHTML = html || '<p class="empty">Rien à afficher</p>';

  // DESSIN DU GRAPHIQUE CHART.JS
  if (sortedCats.length > 0) {
    const ctx = document.getElementById('catChart').getContext('2d');
    if (myChart) myChart.destroy(); // Détruire l'ancien graphique s'il existe

    const labels = sortedCats.map(x => x[0]);
    const data   = sortedCats.map(x => x[1].toFixed(2));
    const colors = sortedCats.map(x => catColor(x[0]));

    myChart = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: labels,
        datasets: [{
          data: data,
          backgroundColor: colors,
          borderWidth: 0,
          hoverOffset: 4
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { position: 'right', labels: { color: '#e2e8f8', font: { family: "'DM Sans', sans-serif", size: 11 } } },
          tooltip: {
            callbacks: {
              label: function(context) { return ' ' + context.raw + ' €'; }
            }
          }
        },
        cutout: '65%' // Rend l'anneau plus fin
      }
    });
  }
}

// EXPORT/IMPORT
function exportData() {
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([JSON.stringify(entries)],{type:'application/json'}));
  a.download='madagascar-export.json'; a.click();
}
function importData(ev) {
  const f=ev.target.files[0]; if(!f) return; const r=new FileReader();
  r.onload=e=>{ try{ entries=JSON.parse(e.target.result); saveLocal(); render(); }catch{ alert('Erreur'); } };
  r.readAsText(f); ev.target.value='';
}

// INIT
loadLocal(); loadCollapsed();
if(!entries.length) {
  // Données de démo si c'est vide
  entries.push({id:uid(), ts:Date.now()-1000, kind:'retrait', type:'RetraitEUR', eur:1000, ar:0, date:todayStr()});
  entries.push({id:uid(), ts:Date.now(), kind:'depense', titre:'Essence J1', cat:'4x4', montant:150000, devise:'Ar', taux:4600, date:todayStr()});
  saveLocal();
}
render();
</script>
